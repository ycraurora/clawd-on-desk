<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:;">
<title>Session HUD</title>
<style>
* { box-sizing: border-box; }

:root {
  --hud-bg: rgba(255, 255, 255, 0.88);
  --hud-border: rgba(0, 0, 0, 0.12);
  --text: #242427;
  --text-muted: #6b6b70;
  --shadow: rgba(0, 0, 0, 0.16);
  --running: #16a34a;
  --done: #71717a;
  --interrupted: #d97706;
  --idle: #9ca3af;
}

@media (prefers-color-scheme: dark) {
  :root {
    --hud-bg: rgba(32, 32, 36, 0.88);
    --hud-border: rgba(255, 255, 255, 0.12);
    --text: #f4f4f5;
    --text-muted: #a1a1aa;
    --shadow: rgba(0, 0, 0, 0.34);
    --idle: #71717a;
  }
}

html, body {
  width: 100%;
  margin: 0;
  background: transparent;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
  font-size: 12px;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

html, body { height: 100%; overflow: hidden; }
body { padding: 2px 3px 8px; }

.hud {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--hud-border);
  border-radius: 8px;
  background: var(--hud-bg);
  box-shadow: 0 8px 18px -12px var(--shadow), 0 2px 4px rgba(0, 0, 0, 0.10);
  overflow: hidden;
}

.row {
  height: 28px;
  flex: 0 0 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  cursor: pointer;
  transition: background 80ms ease;
}

.row:hover {
  background: rgba(0, 0, 0, 0.06);
}

@media (prefers-color-scheme: dark) {
  .row:hover {
    background: rgba(255, 255, 255, 0.08);
  }
}

.row:active {
  background: rgba(0, 0, 0, 0.10);
}

@media (prefers-color-scheme: dark) {
  .row:active {
    background: rgba(255, 255, 255, 0.12);
  }
}

.row .left {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1 1 auto;
  min-width: 0;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex: 0 0 auto;
  background: var(--idle);
}

.dot-running { background: var(--running); }
.dot-done { background: var(--done); }
.dot-interrupted { background: var(--interrupted); }
.dot-idle { background: var(--idle); }

.agent-icon {
  width: 16px;
  height: 16px;
  flex: 0 0 auto;
  object-fit: contain;
}

.title {
  min-width: 0;
  flex: 1 1 auto;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}

.row-folded .title {
  font-weight: 500;
  color: var(--text-muted);
}

.right {
  flex: 0 0 auto;
  font-weight: 400;
  line-height: 1;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  max-width: 45%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
</style>
</head>
<body>
  <div id="hud" class="hud"></div>
  <script src="./session-hud-renderer.js"></script>
</body>
</html>
